---

apiVersion: v1
kind: Secret
metadata:
  name: my-secret
type: Opaque
data : 
  username: YWRtaW4=  # base64 encoded value of 'admin'
  password: cGFzc3dvcmQxMjM=  # base64 encoded value of 'password123'

---

apiVersion : v1
kind : Pod
metadata : 
  name : mysecretpod
  labels : 
    name : mysecretpod
spec:
  containers :
    - name : mysecretpod
      image : redis 
      volumeMounts :
        - name : mysecretvolume
          mountPath : "/etc/secret-volume"
          readOnly : true

  volumes :
    - name : mysecretvolume
      secret :
        secretName : my-secret

---

apiVersion : v1
kind : Pod
metadata : 
  name : secret-env-pod 
spec :
  containers :
    - name : mycontainer
      image : redis
      envFrom :
        - secretRef :
            name : my-secret
  restartPolicy : Never

---

apiVersion : v1
kind : Pod
metadata : 
  name : secret-env-pod-2
spec :
  containers :
    - name : mycontainer
      image : redis
      env :
        - name : SECRET_USERNAME
          valueFrom :
            secretKeyRef :
              name : my-secret
              key : username

        - name : SECRET_PASSWORD
          valueFrom :
            secretKeyRef :
              name : my-secret
              key : password
  restartPolicy : Never

---
