apiVersion : v1
kind : ReplicationController
metadata:
 name: tomcat-rc 
spec :
  replicas : 4
  selector:
    app: tomcat-app
  template :
    metadata: 
      name : tomcat-pod
      labels : 
        app : tomcat-app
    spec :
      containers : 
        - name : tomcat-containers
          image : vishymails/tomcatimage:1.0
          ports : 
            - containerPort : 8080
            
# The above snippet is a replication controller that creates 3 pods with the same configuration as the pod in example1.yaml.