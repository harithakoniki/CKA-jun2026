---

apiVersion : v1
kind : ResourceQuota 
metadata :
  name : app
spec :
  hard :
    pods : "2"
    requests.cpu : "2"
    requests.memory : 500Mi

---

apiVersion : v1
kind : Pod 
metadata :
  name : mypod 
spec :
  containers :
    - name : mypod 
      image : nginx:latest
      resources :
        requests :
          memory : "1Gi"
          cpu : "0.5"

---

apiVersion : v1
kind : Pod 
metadata :
  name : mypod 
spec :
  containers :
    - name : mypod 
      image : nginx:latest
      resources :
        requests :
          memory : "255Mi"
          cpu : "0.5"

---