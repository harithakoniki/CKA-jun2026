apiVersion : v1
kind : Pod 
metadata :
  name : tomcat-pod 
spec :
  containers :
    - name : tomcat-container
      image : vishymails/tomcatimage:1.0
      ports :
        - containerPort : 8080
      volumeMounts :
        - name : empty-dir-vol
          mountPath : /oracle-cache
  
  volumes :
    - name : empty-dir-vol
      emptyDir : {}

