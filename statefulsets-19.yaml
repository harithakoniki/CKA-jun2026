apiVersion : apps/v1
kind : StatefulSet
metadata : 
  name : statefulset-demo
spec:
  serviceName : "statefulset-service"
  replicas : 3
  selector :
    matchLabels :
      app : statefulset-demo
  template :
    metadata :
      labels :
        app : statefulset-demo
    spec:
      containers :
        - name : redis
          image : redis:latest
          ports :
            - containerPort : 6379
          volumeMounts :
            - name : redis-data
              mountPath : /data

  volumeClaimTemplates :
    - metadata :
        name : redis-data
      spec :
        accessModes : [ "ReadWriteOnce" ]
        resources :
          requests :
            storage : 1Gi
          