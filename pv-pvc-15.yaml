apiVersion : v1
kind : PersistentVolume
metadata :
  name : kube-pv
  labels :
    type : local
spec :
  storageClassName : manual
  capacity :
    storage : 1Gi
  accessModes :
    - ReadWriteOnce
  hostPath :
    path : /mnt/datas
    
---

apiVersion : v1
kind : PersistentVolumeClaim
metadata : 
 name : kube-pvc
spec :
  storageClassName : manual
  accessModes :
    - ReadWriteOnce
  resources :
    requests :
      storage : 1Gi
  selector :
    matchLabels :
      type : local


---


apiVersion : v1
kind : Pod
metadata :
  name : pv-pod
  labels :
    name : pv-pod
spec :
  containers :
    - name : pv-container
      image : nginx
      volumeMounts :
        - mountPath : /test-pd
          name : pv-volume
      ports :
        - containerPort : 80
  volumes :
    - name : pv-volume
      persistentVolumeClaim :
        claimName : kube-pvc
        