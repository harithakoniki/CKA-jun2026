apiVersion : v1
kind : PersistentVolume
metadata : 
  name : nfs-pv-18
spec:
  capacity :
    storage : 1Gi
  volumeMode : Filesystem
  accessModes :
    - ReadWriteMany
  persistentVolumeReclaimPolicy : Retain
  nfs :
    path : /my-volume
    server : nfs-server.default.svc.cluster.local
    readOnly : false

