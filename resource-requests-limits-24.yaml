apiVersion : v1
kind : Pod
metadata :
  name : hello
spec :
  containers :
    - name : hello
      image : bmuschko/nodejs-hello-world:1.0.0
      ports : 
        - name : nodejs-port
          containerPort : 3000
      volumeMounts :
        - name : log-volume
          mountPath : /var/log
      resources :
        requests :
          memory : 500Mi
          cpu : 100m
          ephemeral-storage : 1Gi
        limits :
          memory : 500Mi
          ephemeral-storage : 2Gi


  volumes :
    - name : log-volume
      emptyDir : {}

