apiVersion : v1
kind : Pod
metadata :
  name : tomcat-hostpath
spec :
  containers :
    - name : tomcat-container
      image : vishymails/tomcatimage:1.0
      ports :
        - containerPort : 8080
      volumeMounts :
        - name : hostpath-vol
          mountPath : /oracle-volume
      

  volumes :
    - name : hostpath-vol
      hostPath :
        path : /test-volume

