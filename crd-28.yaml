---

apiVersion : apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backups.example.com
spec:
  group: example.com
  versions :
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                cronExpression :
                  type : string
                podName : 
                  type : string
                path : 
                  type : string
    
  scope : Namespaced 
  names : 
    kind : Backup
    singular : backup 
    plural : backups 
    shortNames : 
      - bu

---

apiVersion : example.com/v1
kind : Backup 
metadata : 
  name : nginx-backup 
spec :
  cronExpression : "0 0 * * *"
  podName : nginx 
  path : /usr/local/nginx

---



                  