---

apiVersion : certificates.k8s.io/v1
kind : CertificateSigningRequest
metadata :
  name : nec-adm
spec :
  request : 
  signerName : kubernetes.io/kube-apiserver-client
  usages :
    - client auth

---

apiVersion : rbac.authorization.k8s.io/v1
kind : Role
metadata :
  name : pod-admin
  namespace : nec 
rules :
  - apiGroups : [""]
    resources : ["pods"]
    verbs : ["get", "update", "watch", "list", "create", "delete"]

---

apiVersion : rbac.authorization.k8s.io/v1
kind : RoleBinding
metadata :
  name : admin-pods
  namespace : nec
subjects :
  - kind : User
    name : nec-adm
    apiGroup : rbac.authorization.k8s.io
roleRef :
  kind : Role
  name : pod-admin
  apiGroup : rbac.authorization.k8s.io

---
